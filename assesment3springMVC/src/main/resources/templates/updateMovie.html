<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Movie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-container{
    width:480px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:35px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:12px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.4);
    border-radius:10px;
    color:#fff;
}

.input-group label{
    position:absolute;
    top:50%;
    left:15px;
    transform:translateY(-50%);
    color:rgba(255,255,255,0.7);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    background:#203a43;
    padding:0 6px;
    color:#00e6e6;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#00e6e6,#00b3b3);
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="form-container">
<h2>✏️ Update Movie</h2>

<form th:action="@{/updateMovie}" th:object="${movie}" method="post">
<input type="hidden" th:field="*{id}">

<div class="input-group">
<input type="text" th:field="*{title}" placeholder=" " required>
<label>Title</label>
</div>

<div class="input-group">
<input type="text" th:field="*{genre}" placeholder=" " required>
<label>Genre</label>
</div>

<div class="input-group">
<input type="text" th:field="*{director}" placeholder=" " required>
<label>Director</label>
</div>

<div class="input-group">
<input type="number" th:field="*{releaseYear}" placeholder=" " required>
<label>Release Year</label>
</div>

<div class="input-group">
<input type="number" step="0.1" th:field="*{rating}" placeholder=" " required>
<label>Rating</label>
</div>

<button type="submit">Update Movie</button>
</form>

<a href="/movies" style="display:block;text-align:center;color:#fff;margin-top:15px;">← Back</a>
</div>

</body>
</html>
