<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Movie List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:95%;
    max-width:1200px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(16px);
    border-radius:22px;
    padding:30px;
    box-shadow:0 25px 55px rgba(0,0,0,0.35);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
}

h1{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
    letter-spacing:1px;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:14px;
}

thead{
    background:linear-gradient(135deg,#ff512f,#dd2476);
}

thead th{
    padding:15px;
    color:#fff;
    font-size:14px;
}

tbody tr{
    background:rgba(255,255,255,0.9);
    transition:0.3s;
}

tbody tr:hover{
    transform:scale(1.02);
    background:#ffe0ec;
}

tbody td{
    padding:14px;
    text-align:center;
    font-size:14px;
}

.action-bar{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:25px;
}

.btn{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    font-weight:500;
    text-decoration:none;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.add-btn{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.edit-btn{
    background:linear-gradient(135deg,#f7971e,#ffd200);
    color:#333;
}

.delete-btn{
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 18px 35px rgba(0,0,0,0.4);
}

.footer{
    margin-top:18px;
    text-align:center;
    color:#fff;
    font-size:13px;
    opacity:0.85;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎬 Movie Management</h1>

    <form>
        <table>
            <thead>
                <tr>
                    <th>Select</th>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Genre</th>
                    <th>Director</th>
                    <th>Year</th>
                    <th>Rating</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movie : ${movies}">
                    <td><input type="radio" name="selectedId" th:value="${movie.id}"></td>
                    <td th:text="${movie.id}"></td>
                    <td th:text="${movie.title}"></td>
                    <td th:text="${movie.genre}"></td>
                    <td th:text="${movie.director}"></td>
                    <td th:text="${movie.releaseYear}"></td>
                    <td th:text="${movie.rating}"></td>
                </tr>
            </tbody>
        </table>
    </form>

    <div class="action-bar">
        <a href="/addMovie" class="btn add-btn">➕ Add Movie</a>
        <button class="btn edit-btn" onclick="editMovie()">✏️ Edit</button>
        <button class="btn delete-btn" onclick="deleteMovie()">🗑️ Delete</button>
    </div>

    <div class="footer">
        © 2026 | Movie Management System
    </div>
</div>

<script>
function getSelectedId(){
    const selected=document.querySelector('input[name="selectedId"]:checked');
    if(!selected){
        alert("Please select a movie first");
        return null;
    }
    return selected.value;
}

function editMovie(){
    const id=getSelectedId();
    if(id) window.location.href='/editMovie/'+id;
}

function deleteMovie(){
    const id=getSelectedId();
    if(id && confirm("Are you sure you want to delete this movie?")){
        window.location.href='/deleteMovie/'+id;
    }
}
</script>

</body>
</html>
