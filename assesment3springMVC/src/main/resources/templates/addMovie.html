<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Movie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
}

.form-box{
    width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:35px;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
}

.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:12px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.5);
    border-radius:10px;
    color:#fff;
    outline:none;
}

.input-group label{
    position:absolute;
    top:50%;
    left:12px;
    transform:translateY(-50%);
    color:rgba(255,255,255,0.7);
    transition:0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    background:#203a43;
    padding:0 6px;
    color:#00e6e6;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#00e6e6,#00b3b3);
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(0,230,230,0.6);
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#fff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="form-box">
<h2>➕ Add Movie</h2>

<form th:action="@{/saveMovie}" th:object="${movie}" method="post">

<div class="input-group">
<input type="text" th:field="*{title}" placeholder=" " required>
<label>Title</label>
</div>

<div class="input-group">
<input type="text" th:field="*{genre}" placeholder=" " required>
<label>Genre</label>
</div>

<div class="input-group">
<input type="text" th:field="*{director}" placeholder=" " required>
<label>Director</label>
</div>

<div class="input-group">
<input type="number" th:field="*{releaseYear}" placeholder=" " required>
<label>Release Year</label>
</div>

<div class="input-group">
<input type="number" step="0.1" th:field="*{rating}" placeholder=" " required>
<label>Rating</label>
</div>

<button type="submit">Save Movie</button>
</form>

<a href="/movies">← Back</a>
</div>

</body>
</html>
